name: Build Google Play AAB APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Convert uploaded logo file to Android launcher icons
        run: |
          python3 -m pip install --quiet pillow
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          cat > /tmp/make_icons.py <<'PY'
          from PIL import Image, ImageOps, ImageDraw
          from pathlib import Path

          src = Path("app-logo-source.bin")
          sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192,
          }

          BG = (30, 136, 229, 255)

          def load_logo():
              try:
                  img = Image.open(src)
                  img = ImageOps.exif_transpose(img)
                  img = img.convert("RGBA")
                  if img.width < 8 or img.height < 8:
                      raise Exception("Logo too small")
                  return img
              except Exception:
                  img = Image.new("RGBA", (1024, 1024), BG)
                  d = ImageDraw.Draw(img)
                  d.text((390, 470), "Clima", fill=(255,255,255,255))
                  return img

          def fit_square(img, size):
              # Use the real full logo. No white circle. No tiny center scaling.
              w, h = img.size
              scale = min(size / w, size / h)
              nw, nh = max(1, int(w * scale)), max(1, int(h * scale))
              resized = img.resize((nw, nh), Image.Resampling.LANCZOS)

              canvas = Image.new("RGBA", (size, size), BG)
              canvas.alpha_composite(resized, ((size - nw)//2, (size - nh)//2))
              return canvas

          logo = load_logo()

          for folder, size in sizes.items():
              out = Path("app/src/main/res") / folder
              out.mkdir(parents=True, exist_ok=True)
              icon = fit_square(logo, size)
              icon.save(out / "ic_launcher.png", "PNG", optimize=True)
              icon.save(out / "ic_launcher_round.png", "PNG", optimize=True)
          PY
          python3 /tmp/make_icons.py
      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.p12
      - name: Build signed APK and AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_TYPE: ${{ secrets.STORE_TYPE }}
        run: gradle assembleRelease bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: google-play-build
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
